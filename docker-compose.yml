services:
  db:
    image: mysql:8.4
    container_name: easyrent-db
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [
        "CMD-SHELL",
        "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
      ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: easyrent-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
    command: >
      gunicorn EasyRent.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --threads 2
      --timeout 60

volumes:
  mysql_data:
  media_data:
  staticfiles_data:
